<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Snake • Wisdom Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { 
            border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); 
            image-rendering: pixelated;
        }
        .control-btn {
            width: 54px;
            height: 54px;
            font-size: 28px;
            transition: all 0.1s ease;
        }
        .control-btn:active {
            transform: scale(0.9);
            background-color: #166534;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-bold tracking-tighter">GROK SNAKE</h1>
                <p class="text-emerald-400 text-sm">Wisdom Edition • Abuja, NG</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-zinc-400">HIGH SCORE</div>
                <div id="highscore" class="text-2xl font-mono text-emerald-300">0</div>
            </div>
        </div>

        <!-- Game Container -->
        <div class="bg-zinc-900 rounded-3xl p-6 shadow-2xl border border-zinc-800">
            <!-- Stats -->
            <div class="flex justify-between mb-6 px-2">
                <div class="text-center">
                    <div class="text-xs text-zinc-400">SCORE</div>
                    <div id="score" class="text-4xl font-mono font-semibold text-white">0</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-zinc-400">LEVEL</div>
                    <div id="level" class="text-4xl font-mono font-semibold text-emerald-400">1</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-zinc-400">LIVES</div>
                    <div id="lives" class="text-3xl">❤️❤️❤️</div>
                </div>
            </div>

            <!-- Canvas -->
            <div class="flex justify-center mb-6">
                <canvas id="gameCanvas" width="400" height="400" class="bg-zinc-950"></canvas>
            </div>

            <!-- On-screen Controls -->
            <div class="flex justify-center mb-8">
                <div class="grid grid-cols-3 gap-2 w-[180px]">
                    <!-- Empty -->
                    <div></div>
                    <button onclick="moveUp()" class="control-btn bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl flex items-center justify-center">↑</button>
                    <div></div>
                    
                    <button onclick="moveLeft()" class="control-btn bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl flex items-center justify-center">←</button>
                    <button onclick="togglePause()" id="pauseBtn" 
                            class="control-btn col-span-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded-2xl text-sm font-medium">PAUSE</button>
                    <button onclick="moveRight()" class="control-btn bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl flex items-center justify-center">→</button>
                    
                    <!-- Empty -->
                    <div></div>
                    <button onclick="moveDown()" class="control-btn bg-zinc-800 hover:bg-zinc-700 text-white rounded-2xl flex items-center justify-center">↓</button>
                    <div></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-3">
                <button onclick="startNewGame()" 
                        class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 font-semibold rounded-2xl transition text-lg">
                    RESTART GAME
                </button>
            </div>
        </div>

        <!-- Status Message -->
        <div id="message" class="mt-6 text-center text-emerald-300 font-medium min-h-[28px] text-sm"></div>

        <p class="text-center text-xs text-zinc-500 mt-8">
            Keyboard: Arrow Keys or WASD • Tap buttons on mobile
        </p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const livesEl = document.getElementById("lives");
        const highscoreEl = document.getElementById("highscore");
        const messageEl = document.getElementById("message");
        const pauseBtn = document.getElementById("pauseBtn");

        const grid = 20;
        let snake, dx, dy, food, score, level, lives, gameInterval, isPaused, gameRunning;
        let highScore = parseInt(localStorage.getItem("grokSnakeHigh")) || 0;
        highscoreEl.textContent = highScore;

        function initGame() {
            snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
            dx = grid; dy = 0;
            score = 0; level = 1; lives = 3;
            scoreEl.textContent = "0";
            levelEl.textContent = "1";
            livesEl.textContent = "❤️❤️❤️";
            isPaused = false;
            gameRunning = true;
            pauseBtn.textContent = "PAUSE";
            randomFood();
            messageEl.textContent = "";
        }

        function randomFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
                    y: Math.floor(Math.random() * (canvas.height / grid)) * grid
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }

        function draw() {
            ctx.fillStyle = "#18181b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Snake
            ctx.fillStyle = "#10b981";
            snake.forEach((part, i) => {
                ctx.fillRect(part.x + 2, part.y + 2, grid - 4, grid - 4);
                if (i === 0) {
                    ctx.fillStyle = "#059669";
                    ctx.fillRect(part.x + 2, part.y + 2, grid - 4, grid - 4);
                    ctx.fillStyle = "#10b981";
                }
            });

            // Food
            ctx.fillStyle = "#eab308";
            ctx.beginPath();
            ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 4, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (!gameRunning || isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Collision detection
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height ||
                snake.some(part => part.x === head.x && part.y === head.y)) {
                lives--;
                livesEl.textContent = "❤️".repeat(Math.max(0, lives));
                
                if (lives <= 0) {
                    endGame();
                    return;
                }
                // Respawn
                snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
                dx = grid; dy = 0;
                messageEl.textContent = "Life lost • Continue playing";
                setTimeout(() => messageEl.textContent = "", 1500);
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                randomFood();

                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    levelEl.textContent = level;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(update, Math.max(40, 140 - (level * 12)));
                    messageEl.textContent = `Level ${level} • Faster!`;
                    setTimeout(() => messageEl.textContent = "", 1000);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                highscoreEl.textContent = highScore;
                localStorage.setItem("grokSnakeHigh", highScore);
            }
            messageEl.innerHTML = `Game Over<br><span class="text-xl">Final Score: ${score}</span>`;
        }

        function startNewGame() {
            if (gameInterval) clearInterval(gameInterval);
            initGame();
            draw();
            gameInterval = setInterval(update, 130);
        }

        function togglePause() {
            if (!gameRunning) return;
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? "RESUME" : "PAUSE";
        }

        // Directional controls
        function moveUp() { if (dy !== grid) { dx = 0; dy = -grid; } }
        function moveDown() { if (dy !== -grid) { dx = 0; dy = grid; } }
        function moveLeft() { if (dx !== grid) { dx = -grid; dy = 0; } }
        function moveRight() { if (dx !== -grid) { dx = grid; dy = 0; } }

        // Keyboard support
        document.addEventListener("keydown", e => {
            if (!gameRunning || isPaused) return;
            switch (e.key) {
                case "ArrowUp": case "w": case "W": moveUp(); break;
                case "ArrowDown": case "s": case "S": moveDown(); break;
                case "ArrowLeft": case "a": case "A": moveLeft(); break;
                case "ArrowRight": case "d": case "D": moveRight(); break;
                case "p": case "P": togglePause(); break;
            }
        });

        // Touch swipe support (kept for better mobile experience)
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        canvas.addEventListener("touchend", e => {
            if (!gameRunning || isPaused) return;
            const diffX = touchStartX - e.changedTouches[0].screenX;
            const diffY = touchStartY - e.changedTouches[0].screenY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 40) moveLeft();
                else if (diffX < -40) moveRight();
            } else {
                if (diffY > 40) moveUp();
                else if (diffY < -40) moveDown();
            }
        });

        // Start the game
        initGame();
        draw();
        gameInterval = setInterval(update, 130);

        // Tailwind config
        tailwind.config = {};
    </script>
</body>
</html>
