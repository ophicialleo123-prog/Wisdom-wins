<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Snake - Wisdom Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        canvas { border: 6px solid #008751; border-radius: 20px; background: #f8fafc; image-rendering: pixelated; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-800 to-green-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full">
        <div class="text-center mb-6">
            <h1 class="text-5xl font-bold tracking-tighter">GROK SNAKE</h1>
            <p class="text-green-300">Wisdom's Abuja Edition 🇳🇬 • Eat • Grow • Survive</p>
        </div>

        <div class="bg-white/10 backdrop-blur-md rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between text-sm mb-4 px-2">
                <div>Score: <span id="score" class="font-mono text-3xl text-yellow-300">0</span></div>
                <div>Level: <span id="level" class="font-mono text-3xl text-yellow-300">1</span></div>
                <div>Lives: <span id="lives" class="font-mono text-3xl text-red-400">❤️❤️❤️</span></div>
            </div>

            <canvas id="gameCanvas" width="400" height="400" class="mx-auto shadow-inner"></canvas>

            <div class="mt-6 flex gap-3">
                <button onclick="togglePause()" id="pauseBtn"
                        class="flex-1 py-4 bg-white/20 hover:bg-white/30 rounded-2xl font-semibold transition">PAUSE</button>
                <button onclick="startNewGame()" 
                        class="flex-1 py-4 bg-[#008751] hover:bg-green-600 rounded-2xl font-semibold transition">RESTART</button>
            </div>
        </div>

        <div id="message" class="mt-6 text-center text-lg font-medium min-h-[2.5rem]"></div>

        <p class="text-center text-xs text-green-400 mt-8">Arrow Keys / WASD or Swipe on mobile • Built for you</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const levelEl = document.getElementById("level");
        const livesEl = document.getElementById("lives");
        const messageEl = document.getElementById("message");

        const grid = 20;
        let snake, dx, dy, food, score, level, lives, gameInterval, isPaused, gameRunning;
        let highScore = localStorage.getItem("grokSnakeHigh") || 0;

        function initGame() {
            snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
            dx = grid; dy = 0;
            score = 0; level = 1; lives = 3;
            scoreEl.textContent = 0;
            levelEl.textContent = 1;
            livesEl.textContent = "❤️❤️❤️";
            isPaused = false;
            gameRunning = true;
            randomFood();
            messageEl.textContent = "";
        }

        function randomFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
                    y: Math.floor(Math.random() * (canvas.height / grid)) * grid
                };
            } while (snake.some(part => part.x === food.x && part.y === food.y));
        }

        function draw() {
            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Snake body
            ctx.fillStyle = "#008751";
            snake.forEach((part, i) => {
                ctx.fillRect(part.x + 1, part.y + 1, grid - 2, grid - 2);
            });

            // Head
            ctx.fillStyle = "#004d2e";
            ctx.fillRect(snake[0].x + 1, snake[0].y + 1, grid - 2, grid - 2);

            // Food
            ctx.fillStyle = "#facc15";
            ctx.beginPath();
            ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (!gameRunning || isPaused) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Collisions
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height ||
                snake.some(part => part.x === head.x && part.y === head.y)) {
                lives--;
                livesEl.textContent = "❤️".repeat(lives);
                if (lives <= 0) {
                    endGame();
                    return;
                } else {
                    // Reset position but keep score/level
                    snake = [{x: 160, y: 160}, {x: 140, y: 160}, {x: 120, y: 160}];
                    dx = grid; dy = 0;
                    messageEl.textContent = "Lost a life! Be careful";
                    setTimeout(() => messageEl.textContent = "", 1500);
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                randomFood();

                // Level up every 50 points
                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    levelEl.textContent = level;
                    messageEl.textContent = `Level ${level} - Faster!`;
                    setTimeout(() => messageEl.textContent = "", 1200);
                    clearInterval(gameInterval);
                    gameInterval = setInterval(update, Math.max(50, 150 - level * 15));
                }

                // Eat sound
                try { new AudioContext().createOscillator().connect(new AudioContext().destination).start(); } catch(e){}
            } else {
                snake.pop();
            }

            draw();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("grokSnakeHigh", highScore);
            }
            messageEl.innerHTML = `Game Over!<br>Final Score: ${score}<br>High Score: ${highScore}<br><span class="text-sm mt-2 block">Click RESTART</span>`;
        }

        function startNewGame() {
            if (gameInterval) clearInterval(gameInterval);
            initGame();
            draw();
            gameInterval = setInterval(update, 120); // Starting speed
        }

        function togglePause() {
            if (!gameRunning) return;
            isPaused = !isPaused;
            document.getElementById("pauseBtn").textContent = isPaused ? "RESUME" : "PAUSE";
            if (!isPaused) update();
        }

        // Keyboard
        document.addEventListener("keydown", e => {
            if (!gameRunning || isPaused) return;
            switch (e.key) {
                case "ArrowUp": case "w": case "W": if (dy !== grid) { dx = 0; dy = -grid; } break;
                case "ArrowDown": case "s": case "S": if (dy !== -grid) { dx = 0; dy = grid; } break;
                case "ArrowLeft": case "a": case "A": if (dx !== grid) { dx = -grid; dy = 0; } break;
                case "ArrowRight": case "d": case "D": if (dx !== -grid) { dx = grid; dy = 0; } break;
                case "p": case "P": togglePause(); break;
            }
        });

        // Simple mobile swipe support
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener("touchstart", e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        });
        canvas.addEventListener("touchend", e => {
            if (!gameRunning || isPaused) return;
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && dx !== grid) { dx = -grid; dy = 0; }
                else if (diffX < -30 && dx !== -grid) { dx = grid; dy = 0; }
            } else {
                if (diffY > 30 && dy !== grid) { dx = 0; dy = -grid; }
                else if (diffY < -30 && dy !== -grid) { dx = 0; dy = grid; }
            }
        });

        // Initial setup
        initGame();
        draw();

        // Tailwind
        tailwind.config = {};
    </script>
</body>
</html>
