<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Snake - Wisdom Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        canvas { border: 4px solid #008751; border-radius: 16px; background: #f0f0f0; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-700 to-green-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center">
        <h1 class="text-5xl font-bold mb-2 tracking-tight">GROK SNAKE</h1>
        <p class="text-green-200 mb-6">For Wisdom in Abuja 🇳🇬 • Eat & Grow!</p>
        
        <div class="flex justify-between items-center mb-4 px-4">
            <div>Score: <span id="score" class="font-mono text-3xl text-yellow-300">0</span></div>
            <div>High: <span id="highscore" class="font-mono text-3xl text-yellow-300">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400" class="mx-auto shadow-2xl"></canvas>
        
        <div class="mt-6 flex flex-col gap-3">
            <div class="text-sm text-green-200">
                Arrow Keys or WASD to move • Avoid walls & yourself
            </div>
            <button onclick="startGame()" 
                    id="startBtn"
                    class="w-full py-4 bg-white text-green-800 font-semibold text-xl rounded-3xl hover:bg-green-100 transition">
                START
